<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>학습 리포트</title>

<!-- CDN 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- 스타일 -->
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/report.css">
</head>
<body>

<!-- ════ 패널 (A 영역) ════ -->
<div class="panel">
  <div class="panel-head">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">📝</span>
      <h2 style="margin:0;font-size:15px;font-weight:800;color:#111;">학습 리포트</h2>
    </div>
    <div id="sbar" class="sbar idle" onclick="triggerLoad()">📂 엑셀 파일 불러오기</div>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="loadExcel(this)">
    <button class="btn-s" onclick="createTemplate()" style="width:100%;margin-top:4px;">📋 새 파일 만들기 (6월까지 템플릿)</button>

    <!-- 학생 목록 -->
    <div id="gStudents" style="display:none;">
      <div onclick="toggleStudentSec()" style="cursor:pointer;background:#f9fafb;border:1px solid #e5e8eb;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-size:11px;font-weight:700;color:#8a8f9e;">학생 목록</span>
          <div style="font-size:13px;font-weight:600;color:#333;margin-top:2px;" id="studentSummary">—</div>
        </div>
        <span id="studentArrow" style="font-size:13px;color:#8a8f9e;transition:transform .2s;display:inline-block;">▾</span>
      </div>
      <div id="studentListEdit" style="display:none;flex-direction:column;gap:0;margin-top:6px;">
        <div id="studentListItems"></div>
        <div style="display:flex;gap:4px;margin-top:8px;">
          <input type="text" id="newStudentInput" placeholder="새 학생 이름" style="flex:1;" onkeydown="if(event.key==='Enter')addStudent()">
          <button class="btn-s" onclick="addStudent()">추가</button>
        </div>
      </div>
    </div>

    <div class="cg" id="gDate" style="display:none;">
      <label>수업일</label>
      <select id="selDate" onchange="onDate()"><option value="">— 날짜 선택 —</option></select>
    </div>

    <!-- 현재 진도 -->
    <div id="gCurProgHead" style="display:none;">
      <div onclick="toggleCurProg()" style="cursor:pointer;background:#f9fafb;border:1px solid #e5e8eb;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-size:11px;font-weight:700;color:#8a8f9e;">현재 진도</span>
          <div style="font-size:13px;font-weight:600;color:#333;margin-top:2px;" id="curProgSummary">—</div>
        </div>
        <span id="curProgArrow" style="font-size:13px;color:#8a8f9e;transition:transform .2s;display:inline-block;">▾</span>
      </div>
      <div id="curProgEdit" style="display:none;margin-top:6px;flex-direction:column;gap:0;">
        <div class="cg">
          <input type="text" id="inCurBook" placeholder="교재명" style="color:#333!important;" oninput="rmAuto(this);fp('rCurBook','inCurBook');updateCurProgSummary()">
          <input type="text" id="inCurChap" placeholder="단원명" style="color:#333!important;" oninput="rmAuto(this);fp('rCurChap','inCurChap');updateCurProgSummary()">
          <textarea id="inCurDetail" placeholder="상세 진도" rows="2" style="color:#333!important;" oninput="rmAuto(this);fp('rCurDetail','inCurDetail')"></textarea>
        </div>
      </div>
    </div>

    <!-- 이번 주차 과제 -->
    <div id="gNextHwHead" style="display:none;">
      <div onclick="toggleNextHw()" style="cursor:pointer;background:#f9fafb;border:1px solid #e5e8eb;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-size:11px;font-weight:700;color:#8a8f9e;">이번 주차 과제</span>
          <div style="font-size:13px;font-weight:600;color:#333;margin-top:2px;" id="nextHwSummary">—</div>
        </div>
        <span id="nextHwArrow" style="font-size:13px;color:#8a8f9e;transition:transform .2s;display:inline-block;">▾</span>
      </div>
      <div id="nextHwEdit" style="display:none;margin-top:6px;">
        <div class="cg">
          <textarea id="inputNotice" rows="3" style="color:#333!important;" oninput="rmAuto(this);updateNoticeList(this.value);updateNextHwSummary()"></textarea>
        </div>
      </div>
    </div>

    <!-- 이전 진도 hidden inputs -->
    <input type="hidden" id="inPrevBook">
    <input type="hidden" id="inPrevChap">
    <input type="hidden" id="inPrevDetail">
    <!-- 미니테스트 hidden inputs (JS 참조용, 화면에 표시 안 함) -->
    <input type="number" id="inputCorrect" style="display:none;">
    <input type="number" id="inputTotal" style="display:none;">
    <div id="calcResult" style="display:none;"></div>
  </div>

  <div class="tab-bar" id="tabBar" style="display:none;"></div>

  <div class="panel-body">
    <div class="sdiv" id="sdMain" style="display:none;">과제 &amp; 진도</div>

    <div class="cg" id="gPrevHw" style="display:none;">
      <label>저번 주차 과제 <span class="ab">자동</span></label>
      <div id="hwEditor" style="display:flex;flex-direction:column;gap:4px;"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
        <span style="font-size:13px;font-weight:700;color:#4e5968;">이행률</span>
        <span class="ab">자동계산</span>
        <input type="number" id="inputRate" min="0" max="100" style="width:100px;text-align:center;" oninput="onRateManual()">
        <span style="font-size:13px;font-weight:600;color:#9ca3af;">%</span>
      </div>
    </div>

    <div class="sdiv" id="sdOpt" style="display:none;">선택 항목</div>

    <!-- 미니테스트 토글 -->
    <div class="sw-row" id="toggleMini" style="display:none;" onclick="toggleSec('mini')">
      <div class="sw-track"><div class="sw-thumb"></div></div>
      <div style="flex:1;">
        <div class="sw-label">📝 미니 테스트</div>
        <div class="sw-desc">리포트에 테스트 결과 포함</div>
      </div>
    </div>
    <div id="gMini" style="display:none;flex-direction:column;gap:8px;">
      <div class="cg">
        <label>오답 번호 <span style="font-size:10px;font-weight:500;color:#9ca3af;">(쉼표 구분, 예: 1번, 3번)</span></label>
        <input type="text" id="inputWrong" placeholder="1번, 3번" oninput="updateWrongTags(this.value)">
      </div>
      <input type="file" id="pdfInput" accept=".pdf" style="display:none;" onchange="loadAttachPdf(this)">
      <button class="btn-s" id="btnAttach" onclick="document.getElementById('pdfInput').click()">
        <span>📎</span><span id="attachLabel">시험자료 첨부</span>
      </button>
    </div>

    <!-- 코멘트 토글 -->
    <div class="sw-row" id="toggleComment" style="display:none;" onclick="toggleSec('comment')">
      <div class="sw-track"><div class="sw-thumb"></div></div>
      <div style="flex:1;">
        <div class="sw-label">💬 코멘트</div>
        <div class="sw-desc">선생님 한마디 포함</div>
      </div>
    </div>
    <div class="cg" id="gComment" style="display:none;">
      <label>강사명 <span class="ab">자동</span></label>
      <input type="text" id="inputTeacher" oninput="rmAuto(this);updateCommentSign()" style="margin-bottom:4px;">
      <textarea id="inputComment" rows="2" placeholder="한마디 코멘트를 입력하세요" oninput="fp('commentBody','inputComment')"></textarea>
    </div>

    <button class="btn-p" id="btnSave" onclick="saveToExcel()" style="display:none;" disabled>💾 저장 (엑셀)</button>
    <button class="btn-d" id="btnPdf" onclick="dlPdf()" style="display:none;">📄 PDF 저장</button>
    <div id="lastSaved" style="font-size:11px;color:#9ca3af;text-align:center;display:none;"></div>
  </div>
</div>

<!-- ════ 미리보기 (B 영역) ════ -->
<div class="preview" id="previewArea">
  <div class="page-nav" id="pageNav" style="display:none;">
    <button id="btnPrev" onclick="prevSpread()" disabled>‹</button>
    <span class="pinfo" id="pageInfo">1 / 1</span>
    <button id="btnNext" onclick="nextSpread()" disabled>›</button>
  </div>
  <div class="spread-row" id="spreadRow">
    <div class="page-slot" id="leftSlot">

      <!-- 리포트 카드 -->
      <div class="rc" id="reportCard">
        <div class="rc-header">
          <div class="rc-sname">
            <span id="rName" class="eh" contenteditable="true" style="display:inline;"></span><span class="suf">학생</span>
          </div>
          <div class="rc-meta">
            <div class="rc-date" id="rDate"></div>
          </div>
        </div>

        <!-- ① 이행률 -->
        <div class="sec" id="secRate">
          <div class="sec-title green">숙제 이행률</div>
          <div class="rate-wrap">
            <div class="rate-num"><span id="rRate" class="eh" contenteditable="true">—</span></div>
            <div class="rate-unit">%</div>
          </div>
          <div class="rate-chart">
            <div class="chart-inner"><svg class="lc" id="svgChart" viewBox="0 0 660 100" preserveAspectRatio="none"></svg></div>
            <div class="chart-labels" id="gLabels"></div>
          </div>
        </div>

        <!-- ② 저번 주차 과제 -->
        <div class="sec" id="secPrevHw">
          <div class="sec-title">
            저번 주차 과제
            <span id="rPrevHwDate" class="prev-hw-date"></span>
          </div>
          <ul class="hw-list" id="rHwList"></ul>
        </div>

        <!-- ③ 진도 -->
        <div class="sec">
          <div class="sec-title">수업 진도</div>
          <div class="prog-row">
            <div class="prog-card current">
              <div class="prog-label">현재 진도 <span id="rCurDt" style="text-transform:none;font-weight:500;"></span></div>
              <div>
                <span class="prog-book eh" id="rCurBook" contenteditable="true" data-panel="inCurBook"></span>
                <span class="prog-chap eh" id="rCurChap" contenteditable="true" data-panel="inCurChap"></span>
              </div>
              <div class="prog-detail eh" id="rCurDetail" contenteditable="true" data-panel="inCurDetail"></div>
            </div>
            <div class="prog-card prev">
              <div class="prog-label">이전 진도 <span id="rPrevDt" style="text-transform:none;font-weight:500;"></span></div>
              <div>
                <span class="prog-book eh" id="rPrevBook" contenteditable="true" data-panel="inPrevBook"></span>
                <span class="prog-chap eh" id="rPrevChap" contenteditable="true" data-panel="inPrevChap"></span>
              </div>
              <div class="prog-detail eh" id="rPrevDetail" contenteditable="true" data-panel="inPrevDetail"></div>
            </div>
          </div>
        </div>

        <!-- ④ 이번 과제 -->
        <div class="sec">
          <div class="sec-title">
            이번 주차 과제
            <span id="rNextHwDate" class="prev-hw-date"></span>
          </div>
          <ul class="next-hw-list" id="rNoticeList"></ul>
        </div>

        <!-- ⑤ 미니테스트 (선택) -->
        <div class="sec" id="secMini" style="display:none;">
          <div class="sec-title green">미니 테스트</div>
          <div class="mini-wrong-row">
            <div class="mini-wrong-lbl">✗ 오답 번호</div>
            <div class="mini-tags" id="rWrongTags"></div>
          </div>
          <span id="rCorrect" style="display:none;"></span>
          <span id="rTotal" style="display:none;"></span>
        </div>

        <!-- ⑥ 코멘트 (선택) -->
        <div class="sec" id="secComment" style="display:none;">
          <div class="sec-title">코멘트</div>
          <div class="comment-wrap">
            <div class="comment-text eh" id="commentBody" contenteditable="true" data-panel="inputComment"></div>
            <div class="teacher-sign eh" id="commentSign" contenteditable="true"></div>
          </div>
        </div>

      </div><!-- /rc -->

      <canvas id="leftPdfCanvas" style="display:none;box-shadow:0 4px 20px rgba(0,0,0,.1);"></canvas>
      <div class="pdf-lbl" id="leftLabel"></div>
    </div>

    <div class="page-slot" id="rightSlot" style="display:none;">
      <canvas id="rightPdfCanvas" style="box-shadow:0 4px 20px rgba(0,0,0,.1);"></canvas>
      <div class="pdf-lbl" id="rightLabel"></div>
    </div>
  </div>
</div>

<!-- JS (의존 순서대로 로드) -->
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/excel.js"></script>
<script src="js/ui.js"></script>
<script src="js/session.js"></script>
<script src="js/autofill.js"></script>
<script src="js/report.js"></script>
<script src="js/pdf.js"></script>
<script src="js/init.js"></script>

</body>
</html>
